<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase Order Viewer</title>
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="page-header">
        <img src="/logo.jpg" alt="Yubisayu" />
        <div class="page-header-text">
          <h1>Purchase Order Viewer</h1>
          <p class="subtitle">Cari pesanan kamu dengan Instagram ID</p>
        </div>
      </div>
      <form class="search-box" id="searchForm">
        <input type="text" id="igInput" placeholder="@your_instagram_id" autocomplete="off" required />
        <button type="submit" id="searchBtn">Cari</button>
      </form>
    </div>

    <div id="results"></div>
  </div>

  <!-- Info popup -->
  <div class="info-overlay" id="infoOverlay">
    <div class="info-popup" id="infoPopup">
      <button class="info-popup-close">&times;</button>
      <div class="info-popup-title" id="infoPopupTitle"></div>
      <div class="info-popup-body" id="infoPopupBody"></div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
